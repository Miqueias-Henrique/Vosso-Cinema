<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vosso Cinema - Sessões Disponíveis</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body> <div class="container mt-5">
        <div class="row mb-4">
            <div class="col text-center">
                <h2 class="display-5 text-neon-cyan"> Sessões Disponíveis</h2>
                <p class="text-secondary">Escolha sua sessão e garanta seu ingresso neon.</p>
            </div>
        </div>
        
        <div class="row" id="listaSessoes">
            <div class="col-12 text-center">
                <div class="spinner-border text-info" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        function listarSessoes() {
            // Recupera os dados do localStorage conforme o tutorial [cite: 80, 82]
            const sessoes = JSON.parse(localStorage.getItem('sessoes')) || [];
            const filmes = JSON.parse(localStorage.getItem('filmes')) || [];
            const salas = JSON.parse(localStorage.getItem('salas')) || [];
            const ingressos = JSON.parse(localStorage.getItem('ingressos')) || [];
            
            const container = document.getElementById('listaSessoes');
            
            if (sessoes.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center mt-5">
                        <div class="alert alert-warning">
                            <h4> Nenhuma sessão disponível</h4>
                            <p>Cadastre sessões no menu para vê-las aqui.</p>
                        </div>
                    </div>
                `;
                return;
            }

            let html = '';
            sessoes.forEach(sessao => {
                // Encadeamento de dados entre entidades conforme requisito [cite: 14, 59]
                const filme = filmes.find(f => f.id === sessao.filmeId);
                const sala = salas.find(s => s.id === sessao.salaId);
                
                if (filme && sala) {
                    const ingressosVendidos = ingressos.filter(i => i.sessaoId === sessao.id).length;
                    const lotado = ingressosVendidos >= sala.capacidade;
                    
                    html += `
                        <div class="col-md-6 col-lg-4 mb-4">
                            <div class="card h-100 sessao-card shadow-lg">
                                <div class="card-body">
                                    <h4 class="card-title text-neon-cyan mb-3">${filme.titulo}</h4>
                                    <div class="mb-3">
                                        <span class="badge bg-secondary me-1">${sala.nome}</span>
                                        <span class="badge bg-info text-dark">${sessao.formato}</span>
                                    </div>
                                    <p class="card-text text-secondary mb-2">
                                        <strong> Data/Hora:</strong> ${new Date(sessao.dataHora).toLocaleString('pt-BR')}<br>
                                        <strong> Preço:</strong> R$ ${parseFloat(sessao.preco).toFixed(2)}<br>
                                        <strong> Idioma:</strong> ${sessao.idioma}
                                    </p>
                                    
                                    <div class="progress mb-3" style="height: 10px; background: #333;">
                                        <div class="progress-bar bg-info" style="width: ${(ingressosVendidos/sala.capacidade)*100}%"></div>
                                    </div>
                                    
                                    <div class="d-flex justify-content-between align-items-center mt-3">
                                        <small class="text-muted"> ${ingressosVendidos}/${sala.capacidade} vendidos</small>
                                        ${lotado ? 
                                            '<span class="btn btn-danger disabled"> LOTADO</span>' : 
                                            `<a href="venda-ingressos.html?sessao=${sessao.id}" class="btn btn-success fw-bold px-4">Comprar</a>`
                                        }
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            
            container.innerHTML = html;
        }

        // Inicializa a listagem ao carregar a página
        window.addEventListener('load', listarSessoes);
    </script>
</body>
</html>
