<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vosso Cinema - Cadastro de Sessoes</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body> <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow-lg">
                    <div class="card-header">
                        <h3 class="mb-0 text-neon-cyan">Sessoes</h3>
                    </div>
                    <div class="card-body">
                        <div id="alertas"></div>
                        
                        <form id="formSessao">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Filme *</label>
                                    <select class="form-select" id="filme" required>
                                        <option value="">Selecione o filme</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Sala *</label>
                                    <select class="form-select" id="sala" required>
                                        <option value="">Selecione a sala</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Data e Hora *</label>
                                    <input type="datetime-local" class="form-control" id="dataHora" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Preço (R$) *</label>
                                    <input type="number" class="form-control" id="preco" step="0.01" min="0.01" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Idioma *</label>
                                    <select class="form-select" id="idioma" required>
                                        <option value="Dublado">Dublado</option>
                                        <option value="Legendado">Legendado</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Formato *</label>
                                    <select class="form-select" id="formato" required>
                                        <option value="2D">2D</option>
                                        <option value="3D">3D</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-warning w-100 text-dark fw-bold">Salvar Sessao</button>
                        </form>
                    </div>
                </div>
                
                <div class="mt-4" id="listaSessoes"></div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
    // Carrega os selects dinamicamente usando o DB do main.js
    function init() {
        const filmes = DB.buscar('filmes');
        const salas = DB.buscar('salas');
        const selFilme = document.getElementById('filme');
        const selSala = document.getElementById('sala');

        // Garante que o select não duplique opções se a página recarregar
        selFilme.innerHTML = '<option value="">Selecione o filme</option>';
        selSala.innerHTML = '<option value="">Selecione a sala</option>';

        filmes.forEach(f => selFilme.add(new Option(f.titulo, f.id)));
        salas.forEach(s => selSala.add(new Option(`${s.nome} (${s.capacidade} lug)`, s.id)));
        
        listar();
    }

    function listar() {
        const sessoes = DB.buscar('sessoes');
        const filmes = DB.buscar('filmes');
        const salas = DB.buscar('salas');
        const container = document.getElementById('listaSessoes');
        
        if (sessoes.length === 0) {
            container.innerHTML = '<p class="text-muted small">Nenhuma sessão cadastrada no momento.</p>';
            return;
        }

        container.innerHTML = '<div class="list-group">' + sessoes.map(s => {
            const filme = filmes.find(f => f.id === s.filmeId);
            const sala = salas.find(sa => sa.id === s.salaId);
            
            const nomeFilme = filme ? filme.titulo : 'Filme não encontrado';
            const nomeSala = sala ? sala.nome : 'Sala não encontrada';

            return `
                <div class="list-group-item d-flex justify-content-between align-items-center bg-dark border-secondary text-white mb-2 rounded">
                    <div>
                        <strong class="text-neon-cyan">${nomeFilme}</strong> 
                        <span class="badge bg-primary ms-2">${nomeSala}</span>
                        <br>
                        <small class="text-secondary">
                            ${new Date(s.dataHora).toLocaleString('pt-BR')} | 
                            R$ ${parseFloat(s.preco).toFixed(2)} | 
                            ${s.formato} - ${s.idioma}
                        </small>
                    </div>
                    <button type="button" class="btn btn-sm btn-danger" onclick="remover(${s.id})">Remover</button>
                </div>
            `;
        }).join('') + '</div>';
    }

    function remover(id) {
        let dados = DB.buscar('sessoes').filter(s => s.id !== id);
        localStorage.setItem('sessoes', JSON.stringify(dados));
        listar();
    }

    document.getElementById('formSessao').onsubmit = (e) => {
        e.preventDefault();
        
        const novaSessao = {
            id: Date.now(),
            filmeId: parseInt(document.getElementById('filme').value),
            salaId: parseInt(document.getElementById('sala').value),
            dataHora: document.getElementById('dataHora').value,
            preco: document.getElementById('preco').value,
            idioma: document.getElementById('idioma').value,
            formato: document.getElementById('formato').value
        };

        if (DB.salvar('sessoes', novaSessao)) {
            // Usa o alerta visual na tela
            const alertas = document.getElementById('alertas');
            alertas.innerHTML = '<div class="alert alert-success">Sessão cadastrada com sucesso!</div>';
            setTimeout(() => alertas.innerHTML = '', 3000);
            
            e.target.reset();
            listar();
        }
    };

    window.addEventListener('load', init);
</script>
</body>
</html>
