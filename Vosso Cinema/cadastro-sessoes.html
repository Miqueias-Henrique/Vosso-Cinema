<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="js/script.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Sessões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <div style="height: 80px;"></div>
    <body style="background: #0a0a0a !important; color: white !important;">
    <div style="height: 80px;"></div>
</head>
<body>
<body style="background: #0a0a0a !important; color: white !important;">
    <div style="height: 80px;"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"> Vosso Cinema </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Início</a>
                <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                <a class="nav-link" href="cadastro-salas.html">Salas</a>
                <a class="nav-link active" href="cadastro-sessoes.html">Sessões</a>
                <a class="nav-link" href="venda-ingressos.html">Vender Ingresso</a>
                <a class="nav-link" href="sessoes.html">Sessões Disponíveis</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header bg-warning text-dark">
                        <h3> Cadastro de Sessões</h3>
                    </div>
                    <div class="card-body">
                        <!-- Alertas de status -->
                        <div id="alertas" class="mb-3"></div>
                        
                        <form id="formSessao">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Filme *</label>
                                    <select class="form-select" id="filme" required>
                                        <option value="">Carregando filmes...</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Sala *</label>
                                    <select class="form-select" id="sala" required>
                                        <option value="">Carregando salas...</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Data e Hora *</label>
                                    <input type="datetime-local" class="form-control" id="dataHora" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Preço (R$) *</label>
                                    <input type="number" class="form-control" id="preco" step="0.01" min="0.01" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Idioma *</label>
                                    <select class="form-select" id="idioma" required>
                                        <option value="">Selecione...</option>
                                        <option value="Dublado">Dublado</option>
                                        <option value="Legendado">Legendado</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Formato *</label>
                                    <select class="form-select" id="formato" required>
                                        <option value="">Selecione...</option>
                                        <option value="2D">2D</option>
                                        <option value="3D">3D</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-warning w-100 text-dark fw-bold">Salvar Sessão</button>
                        </form>
                    </div>
                </div>
                
                <!-- Lista de sessões -->
                <div class="card mt-4">
                    <div class="card-header">
                        <h5>Sessões Cadastradas:</h5>
                    </div>
                    <div class="card-body">
                        <div id="listaSessoes" class="row"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let filmes = [];
        let salas = [];

        // Função para mostrar alertas
        function mostrarAlerta(mensagem, tipo = 'success') {
            const alertas = document.getElementById('alertas');
            alertas.innerHTML = `
                <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                    ${mensagem}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            setTimeout(() => alertas.innerHTML = '', 5000);
        }

        // Carregar filmes e salas dinamicamente
        function carregarSelects() {
            // Filmes
            filmes = JSON.parse(localStorage.getItem('filmes')) || [];
            const selectFilme = document.getElementById('filme');
            selectFilme.innerHTML = '<option value="">Selecione um filme...</option>';
            
            if (filmes.length === 0) {
                selectFilme.innerHTML = '<option value="">Nenhum filme cadastrado</option>';
                mostrarAlerta('Cadastre filmes primeiro!', 'warning');
            } else {
                filmes.forEach(filme => {
                    const option = document.createElement('option');
                    option.value = filme.id;
                    option.textContent = `${filme.titulo} (${filme.genero})`;
                    selectFilme.appendChild(option);
                });
            }

            // Salas
            salas = JSON.parse(localStorage.getItem('salas')) || [];
            const selectSala = document.getElementById('sala');
            selectSala.innerHTML = '<option value="">Selecione uma sala...</option>';
            
            if (salas.length === 0) {
                selectSala.innerHTML = '<option value="">Nenhuma sala cadastrada</option>';
                mostrarAlerta('Cadastre salas primeiro!', 'warning');
            } else {
                salas.forEach(sala => {
                    const option = document.createElement('option');
                    option.value = sala.id;
                    option.textContent = `${sala.nome} (${sala.capacidade} lugares - ${sala.tipo})`;
                    selectSala.appendChild(option);
                });
            }
        }

        // Listar sessões cadastradas
        function listarSessoes() {
            const sessoes = JSON.parse(localStorage.getItem('sessoes')) || [];
            const container = document.getElementById('listaSessoes');
            
            if (sessoes.length === 0) {
                container.innerHTML = '<div class="col-12"><p class="text-muted">Nenhuma sessão cadastrada.</p></div>';
                return;
            }

            container.innerHTML = '';
            sessoes.slice(-5).reverse().forEach(sessao => { // Últimas 5
                const filme = filmes.find(f => f.id == sessao.filmeId);
                const sala = salas.find(s => s.id == sessao.salaId);
                
                const card = document.createElement('div');
                card.className = 'col-md-6 col-lg-4 mb-3';
                card.innerHTML = `
                    <div class="card h-100">
                        <div class="card-body">
                            <h6 class="card-title">${filme ? filme.titulo : 'Filme não encontrado'}</h6>
                            <p class="card-text small">
                                <strong>Sala:</strong> ${sala ? sala.nome : 'Sala não encontrada'}<br>
                                <strong>Data/Hora:</strong> ${new Date(sessao.dataHora).toLocaleString('pt-BR')}<br>
                                <strong>Preço:</strong> R$ ${sessao.preco.toFixed(2)}<br>
                                <strong>${sessao.idioma} - ${sessao.formato}</strong>
                            </p>
                            <button class="btn btn-sm btn-outline-danger" onclick="removerSessao(${sessao.id})">
                                Remover
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Remover sessão
        function removerSessao(id) {
            if (confirm('Remover esta sessão?')) {
                let sessoes = JSON.parse(localStorage.getItem('sessoes')) || [];
                sessoes = sessoes.filter(s => s.id !== id);
                localStorage.setItem('sessoes', JSON.stringify(sessoes));
                listarSessoes();
                mostrarAlerta('Sessão removida!');
            }
        }

        // Configurar data mínima
        document.getElementById('dataHora').min = new Date().toISOString().slice(0, 16);

        // Submit do formulário
        document.getElementById('formSessao').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const filmeId = parseInt(document.getElementById('filme').value);
            const salaId = parseInt(document.getElementById('sala').value);
            
            // Validações
            if (!filmeId || !salaId) {
                mostrarAlerta('Selecione filme e sala!', 'danger');
                return;
            }

            const sessao = {
                id: Date.now(),
                filmeId: filmeId,
                salaId: salaId,
                dataHora: document.getElementById('dataHora').value,
                preco: parseFloat(document.getElementById('preco').value),
                idioma: document.getElementById('idioma').value,
                formato: document.getElementById('formato').value
            };

            let sessoes = JSON.parse(localStorage.getItem('sessoes')) || [];
            sessoes.push(sessao);
            
            try {
                localStorage.setItem('sessoes', JSON.stringify(sessoes));
                mostrarAlerta(' Sessão cadastrada com sucesso!');
                this.reset();
                listarSessoes();
            } catch (e) {
                mostrarAlerta(' Erro ao salvar: ' + e.message, 'danger');
            }
        });

        // Inicializar página
        window.addEventListener('load', function() {
            carregarSelects();
            listarSessoes();
        });
    </script>
</body>
</html>
