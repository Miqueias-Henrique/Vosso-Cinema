<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="js/script.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Salas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <div style="height: 80px;"></div>
    <style>
body { background: #0a0a0a !important; color: white !important; }
.container { background: transparent !important; }
</style>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <body style="background: #0a0a0a !important; color: white !important;">
    <div style="height: 80px;"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"> Vosso Cinema</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Início</a>
                <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                <a class="nav-link active" href="cadastro-salas.html">Salas</a>
                <a class="nav-link" href="cadastro-sessoes.html">Sessões</a>
                <a class="nav-link" href="venda-ingressos.html">Vender Ingresso</a>
                <a class="nav-link" href="sessoes.html">Sessões Disponíveis</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3> Cadastro de Salas</h3>
                    </div>
                    <div class="card-body">
                        <form id="formSala">
                            <div class="mb-3">
                                <label class="form-label">Nome da Sala *</label>
                                <input type="text" class="form-control" id="nomeSala" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Capacidade *</label>
                                <input type="number" class="form-control" id="capacidade" min="1" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tipo *</label>
                                <select class="form-select" id="tipo" required>
                                    <option value="">Selecione...</option>
                                    <option value="2D">2D</option>
                                    <option value="3D">3D</option>
                                    <option value="IMAX">IMAX</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Salvar Sala</button>
                        </form>
                        
                        <!-- Lista de salas cadastradas -->
                        <div class="mt-4">
                            <h5>Salas Cadastradas:</h5>
                            <div id="listaSalas" class="list-group"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 <script>
document.getElementById('formSala').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = {
        nome: document.getElementById('nomeSala').value,
        capacidade: parseInt(document.getElementById('capacidade').value),
        tipo: document.getElementById('tipo').value
    };
    
    if (cinema.cadastrarSala(formData)) {
        cinema.mostrarAlerta(' Sala cadastrada!');
        this.reset();
        cinema.listarSalas('listaSalas');
    }
});
cinema.listarSalas('listaSalas');
</script>
</body>
</html>
